<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial, sans-serif;
}

/* address bar */

#address{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:6px 10px;
border-radius:8px;
font-size:14px;
z-index:1000;
max-width:90%;
}

/* full screen map */

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<h3 id="address"></h3>

<div id="map"></div>

<script>

var map = L.map('map').setView([20,78],5)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

var marker = null
var path = []
var polyline = null

function updateLocation(){

fetch("/locations")
.then(res=>res.json())
.then(async data=>{

if(data.length === 0) return

let last = data[data.length-1]

let lat = last.latitude
let lon = last.longitude

if(marker == null){

marker = L.marker([lat,lon]).addTo(map)
map.setView([lat,lon],16)

}else{

marker.setLatLng([lat,lon])

}

path.push([lat,lon])

if(polyline){
map.removeLayer(polyline)
}

polyline = L.polyline(path,{color:'red'}).addTo(map)

let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
let adr = await res.json()

document.getElementById("address").innerText =
"Address : " + adr.display_name

})

}

setInterval(updateLocation,2000)

</script>

</body>
</html>
