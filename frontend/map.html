<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
text-align:center;
}

h3{
font-size:clamp(14px,3vw,20px);
padding:10px;
margin:0;
word-break:break-word;
}

/* responsive map */

#map{
width:100%;
height:70vh;
}

/* mobile */

@media(max-width:480px){

#map{
height:65vh;
}

}

</style>

</head>

<body>

<h3 id="address"></h3>

<div id="map"></div>

<script>

var map = L.map('map').setView([20,78],5)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

var marker = null
var path = []
var polyline = null

function updateLocation(){

fetch("/locations")
.then(res=>res.json())
.then(async data=>{

if(data.length === 0) return

let last = data[data.length-1]

let lat = last.latitude
let lon = last.longitude

if(marker == null){

marker = L.marker([lat,lon]).addTo(map)
map.setView([lat,lon],16)

}else{

marker.setLatLng([lat,lon])

}

path.push([lat,lon])

if(polyline){
map.removeLayer(polyline)
}

polyline = L.polyline(path,{color:'red'}).addTo(map)

let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
let adr = await res.json()

document.getElementById("address").innerText =
"Address : " + adr.display_name

})

}

setInterval(updateLocation,2000)

</script>

</body>

</html>
