<!DOCTYPE html>
<html>

<body>

<button onclick="getLocation()" style="font-size:25px;padding:20px;">
Tap To Continue
</button>

<script>

function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

fetch("/location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
latitude:pos.coords.latitude,
longitude:pos.coords.longitude
})
})

})

}

</script>

</body>
</html>
