<!DOCTYPE html>
<html>

<head>
<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}
button{
font-size:25px;
padding:20px 40px;
}
</style>
</head>

<body>

<button onclick="getLocation()">
Tap To Continue
</button>

<script>

function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

fetch("/location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
latitude:pos.coords.latitude,
longitude:pos.coords.longitude
})
})

})

}

</script>

</body>
</html>
